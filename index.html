<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>Controle de Frete – Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="./style.css">
  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
  <header class="topbar">
    <h1>Controle de Frete</h1>
    <label class="file-btn">
      <input id="fileInput" type="file" accept=".html,.htm" multiple>
      Importar relatório (.html)
    </label>
  </header>

  <main class="container">
    <section class="cards">
      <div class="card">
        <h3>Total de Placas</h3>
        <p id="totalPlacas">0</p>
      </div>
      <div class="card">
        <h3>Total KM Rodado</h3>
        <p id="totalKm">0 km</p>
      </div>
      <div class="card">
        <h3>Odômetro (último arquivo)</h3>
        <p id="odometro">—</p>
      </div>
    </section>

    <section class="grid">
      <div class="panel">
        <h2>KM por Placa</h2>
        <canvas id="kmChart" height="120"></canvas>
      </div>

      <div class="panel">
        <h2>Detalhes</h2>
        <table class="tabela" id="tabela">
          <thead>
            <tr>
              <th>Placa</th>
              <th>Veículo/Dispositivo</th>
              <th>KM do percurso</th>
              <th>Período</th>
              <th>Odômetro</th>
            </tr>
          </thead>
          <tbody><!-- linhas via JS --></tbody>
        </table>
      </div>
    </section>
  </main>

  <footer class="rodape">
    <small>Feito pra rodar simples e direto. Sem frescura.</small>
  </footer>

  <script src="./app.js"></script>
</body>
</html>
